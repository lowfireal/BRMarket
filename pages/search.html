<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
      <title>Поиск — BR Market</title>
        <link rel="stylesheet" href="../css/style.css">
          <link rel="stylesheet" href="../css/search.css">
            <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
              <script src="https://telegram.org/js/telegram-web-app.js"></script>
                <script src="../js/config.js"></script>
                  <script src="../js/supabase.js"></script>
                  </head>
                  <body>
                    <header class="header">
                        <div class="header-top">
                              <div class="search-bar" style="flex:1">
                                      <span class="search-icon">🔍</span>
                                              <input type="text" id="searchInput" placeholder="Поиск объявлений..."
                                                        oninput="onSearch(this.value)" autofocus>
                                                                <button class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">✕</button>
                                                                      </div>
                                                                          </div>
                                                                            </header>

                                                                              <div class="filters-bar">
                                                                                  <button class="filter-chip active" onclick="setSort('new', this)">Новые</button>
                                                                                      <button class="filter-chip" onclick="setSort('cheap', this)">Дешевле</button>
                                                                                          <button class="filter-chip" onclick="setSort('expensive', this)">Дороже</button>
                                                                                              <button class="filter-chip" onclick="setSort('popular', this)">Популярные</button>
                                                                                                  <button class="filter-chip" onclick="openFilters()">⚙️ Фильтры</button>
                                                                                                    </div>

                                                                                                      <div class="section" style="margin-top:12px">
                                                                                                          <div class="listings-grid" id="searchGrid">
                                                                                                                <div class="empty-state" style="grid-column:span 2">
                                                                                                                        <div class="empty-icon">🔍</div>
                                                                                                                                <p>Введите запрос для поиска</p>
                                                                                                                                      </div>
                                                                                                                                          </div>
                                                                                                                                            </div>

                                                                                                                                              <div class="modal-overlay" id="filtersModal" style="display:none">
                                                                                                                                                  <div class="modal">
                                                                                                                                                        <div class="modal-title">Фильтры</div>
                                                                                                                                                              <div class="filter-group">
                                                                                                                                                                      <div class="filter-label">Сервер</div>
                                                                                                                                                                              <div class="chips-scroll" id="filterServers"></div>
                                                                                                                                                                                    </div>
                                                                                                                                                                                          <div class="filter-group">
                                                                                                                                                                                                  <div class="filter-label">Категория</div>
                                                                                                                                                                                                          <div class="chips-scroll" id="filterCategories"></div>
                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                      <div class="filter-group">
                                                                                                                                                                                                                              <div class="filter-label">Цена</div>
                                                                                                                                                                                                                                      <div class="price-range">
                                                                                                                                                                                                                                                <input class="price-input" type="number" id="priceMin" placeholder="От">
                                                                                                                                                                                                                                                          <span style="color:var(--hint)">—</span>
                                                                                                                                                                                                                                                                    <input class="price-input" type="number" id="priceMax" placeholder="До">
                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                        <button class="btn-submit" onclick="applyFilters()">Применить</button>
                                                                                                                                                                                                                                                                                              <button class="btn-cancel" onclick="closeFilters()">Отмена</button>
                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                      <nav class="bottom-nav">
                                                                                                                                                                                                                                                                                                          <div class="nav-item" onclick="window.location.href='../index.html'">
                                                                                                                                                                                                                                                                                                                <span class="nav-icon">🏠</span><span>Главная</span>
                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                        <div class="nav-item active">
                                                                                                                                                                                                                                                                                                                              <span class="nav-icon">🔍</span><span>Поиск</span>
                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                      <div class="nav-item" onclick="window.location.href='create.html'">
                                                                                                                                                                                                                                                                                                                                            <span class="nav-icon">➕</span><span>Подать</span>
                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                    <div class="nav-item" onclick="window.location.href='favorites.html'">
                                                                                                                                                                                                                                                                                                                                                          <span class="nav-icon">❤️</span><span>Избранное</span>
                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                  <div class="nav-item" onclick="window.location.href='profile.html'">
                                                                                                                                                                                                                                                                                                                                                                        <span class="nav-icon">👤</span><span>Профиль</span>
                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                              </nav>

                                                                                                                                                                                                                                                                                                                                                                                <div class="toast" id="toast"></div>
                                                                                                                                                                                                                                                                                                                                                                                  <script src="../js/search.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                  </html>
